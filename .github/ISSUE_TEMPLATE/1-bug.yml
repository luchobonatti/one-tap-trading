name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Before opening a new issue, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        **Expected:** ...
        **Actual:** ...
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Reproduction link
      description: Link to a minimal reproduction (repo, sandbox, deploy). Issues without a reproduction may be closed.
      placeholder: https://github.com/...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details (OS, browser, runtime, package versions).
      render: bash
      placeholder: |
        OS: macOS 15.3
        Node: 22.x
        Package: 1.0.0
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this impact your work?
      options:
        - Low — cosmetic or minor inconvenience
        - Medium — broken feature, workaround exists
        - High — broken feature, no workaround
        - Critical — system down, data loss, or security issue
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, error messages, or anything else that might help.
    validations:
      required: false
