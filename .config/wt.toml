[post-create]
submodules = "git submodule update --init --recursive"
deps = "pnpm install --frozen-lockfile"
env = """
if [ -f {{ primary_worktree_path }}/.env ]; then
    cp {{ primary_worktree_path }}/.env .env
    echo "Copied .env from primary worktree"
elif [ -f .env.example ]; then
    cp .env.example .env
    echo "Created .env from .env.example"
fi
"""

[pre-commit]
lint = "pnpm lint"
typecheck = "pnpm typecheck"

[pre-merge]
test = "pnpm test"
