[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false
fs_permissions = [{ access = "read-write", path = "deployments" }]

[fuzz]
runs = 10_000

[invariant]
runs = 64
depth = 256
fail_on_revert = false

[rpc_endpoints]
carrot = "${MEGAETH_RPC_URL}"

# MegaETH gas model is ~30x mainnet costs — override multiplier for Carrot deploys.
# Usage: forge script ... --gas-estimate-multiplier 5000
[profile.megaeth]
gas_estimate_multiplier = 5000

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
