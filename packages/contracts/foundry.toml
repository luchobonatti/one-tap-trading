[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = false
ffi = false

[fuzz]
runs = 10_000

[invariant]
runs = 64
depth = 256
fail_on_revert = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
